name: Docker Build

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

  # Permite lanzarlo manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  docker-build-smoke-test:
    # Solo se ejecuta si el workflow CI ha terminado con éxito o si se lanza manualmente
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    # Runner Linux proporcionado por GitHub
    runs-on: ubuntu-latest

   
   

    steps:
      # 1) Descarga el contenido del repositorio en el runner
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2) (Opcional pero recomendable) Comprobar que existe el Dockerfile
      - name: Verificar que existe el Dockerfile
        run: |
          ls -la
          test -f Dockerfile

      # 3) Construye la imagen usando el Dockerfile de la raíz
      - name: Construir imagen Docker
        run: docker build -t store-app:ci .

      # 4) Arranca un contenedor en segundo plano exponiendo el puerto 8080
      - name: Arrancar contenedor
        run: |
          docker run -d --name store-app-test -p 8080:8080 store-app:ci

      # 5) Espera a que la aplicación responda en el endpoint de salud
      - name: Comprobar endpoint de salud
        run: |
          for i in {1..24}; do
            if curl -fsS http://127.0.0.1:8080/actuator/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 5
          done
          echo "El contenedor no respondió a tiempo"
          docker logs store-app-test || true
          exit 1

      # 6) Si algo falla, muestra los logs para facilitar el diagnóstico
      - name: Mostrar logs del contenedor si falla
        if: failure()
        run: docker logs store-app-test || true

      # 7) Limpieza final, tanto si todo va bien como si falla
      - name: Detener y eliminar contenedor
        if: always()
        run: |
          docker stop store-app-test || true
          docker rm store-app-test || true
