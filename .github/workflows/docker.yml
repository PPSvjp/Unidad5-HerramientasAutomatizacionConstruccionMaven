name: Docker Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t store-app:ci .

      - name: Arrancar contenedor
        run: |
          docker run -d --name store-app-test -p 8888:8888 store-app:ci

      - name: Comprobar endpoint de salud
        run: |
          for i in {1..24}; do
            if curl -fsS http://127.0.0.1:8888/actuator/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 5
          done
          echo "El contenedor no respondió a tiempo"
          docker logs store-app-test || true
          exit 1

      - name: Mostrar logs del contenedor si falla
        if: failure()
        run: docker logs store-app-test || true

      - name: Detener y eliminar contenedor
        if: always()
        run: |
          docker stop store-app-test || true
          docker rm store-app-test || true
